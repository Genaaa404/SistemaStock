<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión — StockHouse</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <h2>StockHouse</h2>
      <p>Panel de administración</p>
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for cat, msg in messages %}
        <div class="flash flash-{{ cat }}" style="margin-bottom:.75rem;">{{ msg }}</div>
      {% endfor %}
    {% endwith %}

    <form method="post" style="display:flex;flex-direction:column;gap:1rem;">
      <div class="form-group">
        <label>Usuario</label>
        <input type="text" name="username" required autofocus placeholder="admin">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" name="password" required placeholder="••••••••">
      </div>
      <button type="submit" class="btn btn-primary" style="margin-top:.25rem;">Ingresar</button>
    </form>

    <div style="text-align:center;margin-top:1.25rem;">
      <a href="{{ url_for('publico') }}" style="font-size:.8rem;color:var(--text-muted);text-decoration:none;">
        ← Volver al catálogo
      </a>
    </div>
  </div>
</div>
</body>
</html>
